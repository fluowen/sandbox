<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Fluowen: Technologies Empowering Growth">
    <meta name="keywords" content="Fluowen, AI, Web Development, Technology">
    <meta name="author" content="Fluowen">
    <title>Fluowen</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">
            <img src="images/logo.png" alt="Fluowen Logo" height="30" loading="lazy">
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="#overview">Overview</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#offers">Offers</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#footer">Contact</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Overview Section (Carousel) -->
<section id="overview" class="carousel-section">
  <div id="carouselExampleCaptions" class="carousel slide">
    <div class="carousel-indicators"></div>
    <div class="carousel-inner">
      <div class="carousel-item active">
        <img src="https://images.unsplash.com/photo-1677691824188-3e266886cb27" alt="Slide 1" loading="lazy">
        <div class="carousel-caption">
          <h5>Primeiro Slide</h5>
          <p>Conteúdo representativo do primeiro slide.</p>
        </div>
      </div>
      <div class="carousel-item">
        <img src="https://img.freepik.com/free-photo/close-up-man-shopping-with-laptop_23-2149241375.jpg" alt="Slide 2" loading="lazy">
        <div class="carousel-caption">
          <h5>Segundo Slide</h5>
          <p>Conteúdo representativo do segundo slide.</p>
        </div>
      </div>
      <div class="carousel-item">
        <img src="https://img.freepik.com/free-photo/online-web-design_53876-95309.jpg" alt="Slide 3" loading="lazy">
        <div class="carousel-caption">
          <h5>Terceiro Slide</h5>
          <p>Conteúdo representativo do terceiro slide.</p>
        </div>
      </div>
    </div>
    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide="prev">
      <span class="carousel-control-prev-icon"></span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide="next">
      <span class="carousel-control-next-icon"></span>
    </button>
  </div>
</section>

<!-- Footer -->
<footer id="footer">
    <p>&copy; 2024 Fluowen. All Rights Reserved.</p>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<!-- Custom JS -->
<script src="js/script.js"></script>
</body>
</html>
